spring:
  application:
    name: chat-platform
  config:
    import: classpath:application-postgres.yml
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: "*"

# ====================================
# Server Configuration
# ====================================
server:
  port: 8080
  servlet:
    context-path: /api

# ====================================
# Swagger Configuration (Simple)
# ====================================
springdoc:
  swagger-ui:
    path: /docs

# ====================================
# JWT Configuration
# ====================================
jwt:
  secret: BVyaKi8MZA/+Tt3Nl1GwWy9nbuknr/1cCgQyZ5sHHbQ=
  expiration: 900000
  refresh-expiration: 604800000

# ====================================
# Logging
# ====================================
logging:
  level:
    chatapp.chat_platform: DEBUG
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"