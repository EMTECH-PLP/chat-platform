# ====================================
# MariaDB Configuration
# ====================================
spring:
  datasource:
    url: jdbc:mariadb://localhost:3306/chat_db
    username: root
    password: your_password_here
    driver-class-name: org.mariadb.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true
    show-sql: true