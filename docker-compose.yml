version: '3.8'

services:
  # shared db
  postgres-db:
    image: postgres:15-alpine
    container_name: chat-platform-db
    environment:
      POSTGRES_USER: chat_platform
      POSTGRES_PASSWORD: chat_platform
      POSTGRES_DB: chat_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  
  chat-app:
    build: .
    container_name: chat-platform-app
    ports:
      - "8080:8080"
    
    environment:
      - name=value
      - DB_URL=jdbc:postgresql://postgres-db:5432/{{PRODUCTION_DB_NAME}
      - DB_USERNAME={PRODUCTION_DB_USER}
      - DB_PASSWORD={PRODUCTION_DB_PASSWORD}
      - SHOW_SQL={PRODUCTION_SHOW_SQL}
    depends_on:
      - postgres-db
    
    volumes:
      - pgdata: